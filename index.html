<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="background">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-content">
                <h1 class="app-title">
                    <span class="letter">D</span>
                    <span class="letter">S</span>
                    <span class="letter">A</span>
                    <span class="letter"> </span>
                    <span class="letter">Q</span>
                    <span class="letter">u</span>
                    <span class="letter">i</span>
                    <span class="letter">z</span>
                </h1>
                <p class="subtitle">Test your DSA knowledge!</p>
                <button class="btn btn-start" onclick="startQuiz()">
                    Start Quiz
                    <span class="btn-glow"></span>
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="quiz-info">
                    <span id="question-number">Question 1 of 10</span>
                    <span id="score-display">Score: 0</span>
                </div>
            </div>

            <div class="quiz-content">
                <h2 id="question" class="question"></h2>
                <div id="answers" class="answers"></div>
            </div>

            <div class="quiz-footer">
                <button class="btn btn-next" id="next-btn" onclick="nextQuestion()" style="display: none;">
                    Next Question
                    <span class="btn-glow"></span>
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="results-content">
                <div class="trophy-icon">🏆</div>
                <h2 class="results-title">Quiz Complete!</h2>
                <div class="score-circle">
                    <svg class="score-ring" viewBox="0 0 120 120">
                        <circle class="score-ring-background" cx="60" cy="60" r="54"></circle>
                        <circle class="score-ring-progress" id="score-ring" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="score-text">
                        <span id="final-score" class="final-score-number">0</span>
                        <span class="final-score-label">out of <span id="total-questions">10</span></span>
                    </div>
                </div>
                <p id="result-message" class="result-message"></p>
                <button class="btn btn-restart" onclick="restartQuiz()">
                    Play Again
                    <span class="btn-glow"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
